  // --- Device ID ---
  async function getOrCreateDeviceId() {
    let id = localStorage.getItem(STORAGE_KEY);
    if (id) return id;
    id = await new Promise(resolve => {
      const request = indexedDB.open('deviceDB', 1);
      request.onupgradeneeded = () => request.result.createObjectStore('ids');
      request.onsuccess = () => {
        const tx = request.result.transaction('ids', 'readonly');
        const get = tx.objectStore('ids').get(STORAGE_KEY);
        get.onsuccess = () => resolve(get.result || null);
        get.onerror = () => resolve(null);
      };
      request.onerror = () => resolve(null);
    });
    if (id) { localStorage.setItem(STORAGE_KEY, id); return id; }
    id = crypto.randomUUID();
    localStorage.setItem(STORAGE_KEY, id);
    const dbReq = indexedDB.open('deviceDB', 1);
    dbReq.onupgradeneeded = () => dbReq.result.createObjectStore('ids');
    dbReq.onsuccess = () => dbReq.result.transaction('ids', 'readwrite').objectStore('ids').put(id, STORAGE_KEY);
    return id;
  }
  const deviceId = await getOrCreateDeviceId();
  document.getElementById('deviceIdText').textContent = deviceId;
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(deviceId).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = "✓ Copied!";
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = "Copy Device ID"; btn.classList.remove('copied'); }, 2000);
    });
  });
  // --- Periodic indexedDB → localStorage sync ---
  setInterval(async () => {
    if (!localStorage.getItem(STORAGE_KEY)) {
      const db = await new Promise(resolve => {
        const req = indexedDB.open('deviceDB', 1);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve(null);
      });
      if (db) {
        const get = db.transaction('ids', 'readonly').objectStore('ids').get(STORAGE_KEY);
        get.onsuccess = () => {
          if (get.result) {
            localStorage.setItem(STORAGE_KEY, get.result);
            document.getElementById('deviceIdText').textContent = get.result;
          }
        };
      }
    }
  }, 5000);
  // --- Launch game ---
  async function launchGame() {
    const newWindow = window.open('about:blank', '_blank', 'width=1366,height=768,resizable=yes');
    if (!newWindow) { customBoi("Pop-up blocked! Allow pop-ups for this site."); return; }
    newWindow.document.documentElement.style.overflow = 'hidden';
    newWindow.document.body.style.cssText = 'margin:0;padding:0;background:#000;';
    newWindow.document.body.innerHTML = '<div style="color:white;font-family:sans-serif;text-align:center;margin-top:50px;font-size:18px;">Loading…</div>';
    const gameURL = "https://cdn.jsdelivr.net/gh/sussyboi01/wsrdkgmsjfghjsdaifcjsdfgjhrfadawdwsgdfgdfgwer@985a1c1c6bd8cb81c8a5487503b2e2304ed2ed2e/index.html";
    let html;
    try {
      const res = await fetch(gameURL, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      html = await res.text();
    } catch (err) {
      newWindow.document.body.innerHTML = "<div style='color:white;font-family:monospace;padding:40px;background:#1a0000;height:100vh;box-sizing:border-box;'><h2 style='color:#ff5a5a;'>Error loading game</h2><pre style='color:#ffaaaa;white-space:pre-wrap;'>" + err + "</pre></div>";
      return;
    }
    const base = gameURL.substring(0, gameURL.lastIndexOf('/') + 1);
    const parts = html.split(/(<script[\s\S]*?<\/script>)/gi);
    html = parts.map(part => {
      if (/^<script\b(?![^>]*\bsrc\s*=)/i.test(part)) return part;
      return part.replace(
        /\b(href|src)=(["'])(?!https?:|\/\/|data:|blob:|javascript:|#)([^"']*)\2/gi,
        (_, attr, q, rel) => `${attr}=${q}${base}${rel}${q}`
      );
    }).join('');
    html = html.replace(
      /((?:buildUrl|loaderUrl|streamingAssetsUrl|dataUrl|frameworkUrl|codeUrl|unityBuildUrl)\s*=\s*)(["'])(?!https?:|\/\/|data:|blob:)([^"']+)\2/g,
      (_, pre, q, val) => `${pre}${q}${base}${val}${q}`
    );
    html = html.replace(/new URL\(url, location\.origin\)\.hostname/g, '""');
    if (!/<base\b[^>]*href/i.test(html)) {
      html = html.replace(/(<head[^>]*>)/i, `$1<base href="${base}">`);
    }
    newWindow.document.documentElement.style.overflow = 'hidden';
    newWindow.document.body.style.cssText = 'margin:0;padding:0;background:black;';
    newWindow.document.body.innerHTML = '';
    const iframe = newWindow.document.createElement('iframe');
    iframe.style.cssText = 'width:100%;height:100vh;border:none;display:block;';
    newWindow.document.body.appendChild(iframe);
    // onload fires once about:blank is ready, then write game HTML
    iframe.onload = () => {
      iframe.contentDocument.open();
      iframe.contentDocument.write(html);
      iframe.contentDocument.close();
    };
    iframe.src = 'about:blank';
    window.top.location.href = "https://classroom.google.com";
  }
  // --- Check access, auto-launch or Boi (no button) ---
  const statusMsg = document.getElementById('statusMsg');

})();
